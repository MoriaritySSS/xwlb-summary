<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻联播摘要 - 考公助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f9fa; --card-bg: #fff; --text: #212529; --text-muted: #6c757d;
      --accent: #c41e3a; --accent-hover: #a01830; --border: #dee2e6;
      --tag-policy: #0d6efd; --tag-economy: #198754; --tag-diplomacy: #6f42c1;
      --tag-people: #fd7e14; --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 16px; }

    header { background: var(--accent); color: #fff; padding: 20px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.1); position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: .85; margin-top: 4px; }

    .toolbar { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.95rem; outline: none; }
    .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,30,58,.1); }
    .btn { padding: 10px 18px; border: none; border-radius: var(--radius); font-size: 0.9rem; cursor: pointer; font-weight: 600; transition: .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: #e9ecef; }

    .news-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid var(--border); cursor: pointer; transition: .15s; }
    .news-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.1); }
    .news-card .date { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
    .news-card .preview { font-size: 0.92rem; color: var(--text); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

    .detail-modal { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .detail-modal.hidden { display: none; }
    .detail-content { background: #fff; border-radius: 12px; max-width: 800px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 28px; position: relative; }
    .detail-content .close { position: absolute; top: 12px; right: 16px; font-size: 1.5rem; cursor: pointer; border: none; background: none; color: var(--text-muted); }
    .detail-content h2 { font-size: 1.2rem; margin-bottom: 12px; }
    .detail-content .summary { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.8; }

    .tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-right: 6px; }
    .tag-policy { background: #cfe2ff; color: var(--tag-policy); }
    .tag-economy { background: #d1e7dd; color: var(--tag-economy); }
    .tag-diplomacy { background: #e2d9f3; color: var(--tag-diplomacy); }
    .tag-people { background: #ffe5d0; color: var(--tag-people); }

    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty h3 { font-size: 1.1rem; margin-bottom: 8px; }

    footer { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 0.8rem; }
  </style>
</head>
<body>
<header>
  <div class="container">
    <h1>📰 新闻联播摘要 · 考公助手</h1>
    <p>每日自动抓取 & AI 提炼考公重点</p>
  </div>
</header>

<main class="container">
  <div class="toolbar">
    <input type="text" class="search-box" id="searchInput" placeholder="搜索关键词（如：乡村振兴、GDP）" onkeydown="if(event.key==='Enter')search()">
    <button class="btn btn-primary" onclick="search()">搜索</button>
    <button class="btn btn-outline" onclick="loadList()">最新</button>
  </div>

  <div id="newsList"></div>
  <div id="loading" class="loading" style="display:none">加载中...</div>
</main>

<div class="detail-modal hidden" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="detail-content">
    <button class="close" onclick="closeDetail()">&times;</button>
    <h2 id="detailTitle"></h2>
    <div class="summary" id="detailBody"></div>
  </div>
</div>

<footer>
  <p>数据来源: CCTV 央视网 | 每日定时更新 | 仅供学习参考</p>
</footer>

<script>
// Change this to your deployed Worker URL
const API_BASE = 'https://xwlb-summary.tonbi.workers.dev';

async function loadList() {
  document.getElementById('searchInput').value = '';
  showLoading(true);
  try {
    const resp = await fetch(`${API_BASE}/api/list?limit=30`);
    const data = await resp.json();
    renderList(data);
  } catch (e) {
    document.getElementById('newsList').innerHTML = `<div class="empty"><h3>无法连接到服务器</h3><p>请检查 API 地址配置</p></div>`;
  }
  showLoading(false);
}

async function search() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { loadList(); return; }
  showLoading(true);
  try {
    const resp = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}`);
    const data = await resp.json();
    renderList(data);
  } catch (e) {
    document.getElementById('newsList').innerHTML = `<div class="empty"><h3>搜索失败</h3><p>请稍后重试</p></div>`;
  }
  showLoading(false);
}

function renderList(records) {
  const el = document.getElementById('newsList');
  if (!records || records.length === 0) {
    el.innerHTML = `<div class="empty"><h3>暂无数据</h3><p>请等待每日自动抓取，或手动触发更新</p></div>`;
    return;
  }
  el.innerHTML = records.map(r => `
    <div class="news-card" onclick="showDetail('${r.date}')">
      <div class="date">📅 ${r.date}</div>
      <div class="preview">${escapeHtml(r.summary || '暂无摘要')}</div>
    </div>
  `).join('');
}

function showDetail(date) {
  fetch(`${API_BASE}/api/news?date=${encodeURIComponent(date)}`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('detailTitle').textContent = `📅 ${data.date} 摘要`;
      document.getElementById('detailBody').textContent = data.summary || '暂无内容';
      document.getElementById('detailModal').classList.remove('hidden');
    });
}

function closeDetail() {
  document.getElementById('detailModal').classList.add('hidden');
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str.slice(0, 300);
  return div.innerHTML;
}

// Init
loadList();
</script>
</body>
</html>
